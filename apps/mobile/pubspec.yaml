name: eduflow_mobile
description: EduFlow Mobile App - School Management System

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  flutter_local_notifications: ^16.0.0
  url_launcher: ^6.1.14
  permission_handler: ^11.0.1
  image_picker: ^1.0.4
  flutter_pdfview: ^1.3.1
  syncfusion_flutter_pdf: ^24.1.1
  flutter_offline: ^2.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700