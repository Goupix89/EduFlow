apiVersion: apps/v1
kind: Deployment
metadata:
  name: eduflow-backend
  namespace: eduflow
  labels:
    app: eduflow-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: eduflow-backend
  template:
    metadata:
      labels:
        app: eduflow-backend
    spec:
      containers:
      - name: backend
        image: your-registry/eduflow-backend:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: eduflow-config
        - secretRef:
            name: eduflow-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: eduflow-backend-service
  namespace: eduflow
spec:
  selector:
    app: eduflow-backend
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP